spring:
  datasource:
    url: jdbc:h2:mem:my_sql;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: my_sql
    default-schema: my_sql
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: localhost:9092

app:
  kafka:
    enabled: false

logging:
  level:
    com.insurance.sample: DEBUG
    org.hibernate.SQL: WARN
